[workspace]
authors = ["Conor Bronsdon <cmbronsdon@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-template"
description = "A standalone Jinja-flavored template engine in pure Mojo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
test = "mojo run -I src test/test_template.mojo && mojo run -I src test/test_errors.mojo"
demo = "mojo run -I src examples/render_email.mojo"
fuzz = "mojo run -I src test/fuzz_runner.mojo"
bench = "mojo build -I src bench/bench_render.mojo -o .bench_render && ./.bench_render"
fmt = "mojo format src/ test/ examples/ bench/"
docs = "mojo doc -o docs/api.json -I src src/template && python3 docs/render_api.py docs/api.json docs/api.html"

[dependencies]
mojo = ">=1.0.0b3.dev0,<2"
